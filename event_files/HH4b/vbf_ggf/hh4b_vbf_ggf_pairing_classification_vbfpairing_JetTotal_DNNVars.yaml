# ---------------------------------------------------
# REQUIRED - INPUTS - List all inputs to SPANet here.
# ---------------------------------------------------
INPUTS:
  # -----------------------------------------------------------------------------
  # REQUIRED - SEQUENTIAL - inputs which can have an arbitrary number of vectors.
  # -----------------------------------------------------------------------------
  SEQUENTIAL:
    Jet:
      pt: log_normalize
      eta: normalize
      phi: normalize
      btagPNetB_5wp: none

  # ---------------------------------------------------------------------
  # REQUIRED - GLOBAL - inputs which will have a single vector per event.
  # ---------------------------------------------------------------------
  GLOBAL:
    Event:
      centralityHiggsLeadingJetGoodVBFMergedProvVBFPadded: none
      centralityHiggsSubLeadingJetGoodVBFMergedProvVBFPadded: none
      detaJetGoodVBFMergedProvVBFPadded: normalize
      mjjJetGoodVBFMergedProvVBFPadded: normalize
      # Arctanh_Delta_pairing_probabilities: normalize
      # Delta_pairing_probabilities: normalize
      HT: log_normalize
      dR_max: normalize
      dR_min: normalize
      sigma_over_higgs1_reco_mass: normalize
      sigma_over_higgs2_reco_mass: normalize
    HiggsLeading:
      dEta: normalize
      dPhi: normalize
      dR: normalize
      eta: normalize
      helicityCosTheta: normalize
      phi: normalize
      mass: log_normalize
      pt: log_normalize
    HiggsSubLeading:
      dEta: normalize
      dPhi: normalize
      dR: normalize
      eta: normalize
      helicityCosTheta: normalize
      phi: normalize
      mass: log_normalize
      pt: log_normalize
    HH:
      Costhetastar_CS: normalize
      dEta: normalize
      dPhi: normalize
      dR: normalize
      eta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
# ----------------------------------------------------------------------
# REQUIRED - EVENT - Complete list of resonance particles and daughters.
# ----------------------------------------------------------------------
EVENT:
  vbf:
    - q1
    - q2

# ---------------------------------------------------------
# REQUIRED KEY - PERMUTATIONS - List of valid permutations.
# ---------------------------------------------------------
PERMUTATIONS:
  EVENT:
  vbf:
    - [q1, q2]

# ------------------------------------------------------------------------------
# REQUIRED - REGRESSIONS - List of desired features to regress from observables.
# ------------------------------------------------------------------------------
REGRESSIONS:

# -----------------------------------------------------------------------------
# REQUIRED - REGRESSIONS - List of desired classes to predict from observables.
# -----------------------------------------------------------------------------
CLASSIFICATIONS:
  EVENT:
    - class