# ---------------------------------------------------
# REQUIRED - INPUTS - List all inputs to SPANet here.
# ---------------------------------------------------
INPUTS:
  # -----------------------------------------------------------------------------
  # REQUIRED - SEQUENTIAL - inputs which can have an arbitrary number of vectors.
  # -----------------------------------------------------------------------------
  SEQUENTIAL:
    JetHiggsLeading:
      # MASK: normalize
      btagPNetB_5wp: normalize
      eta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
      reco_provenance: normalize
    JetHiggsSubLeading:
      # MASK: normalize
      btagPNetB_5wp: normalize
      eta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
      reco_provenance: normalize
    Jet5th:
      # MASK: normalize
      btagPNetB_5wp: normalize
      eta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
      reco_provenance: normalize


  # ---------------------------------------------------------------------
  # REQUIRED - GLOBAL - inputs which will have a single vector per event.
  # ---------------------------------------------------------------------
  GLOBAL:
    Event:
      # Arctanh_Delta_pairing_probabilities: normalize
      # Binned_Arctanh_Delta_pairing_probabilities: normalize
      Delta_pairing_probabilities: normalize
      HT: log_normalize
      # Padded_Arctanh_Delta_pairing_probabilities: normalize
      dR_max: normalize
      dR_min: normalize
      # event: normalize
      # kl: normalize
      # year: normalize
    HiggsLeading:
      dR: normalize
      eta: normalize
      helicityCosTheta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
    HiggsSubLeading:
      dR: normalize
      eta: normalize
      helicityCosTheta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
    HH:
      Costhetastar_CS: normalize
      dEta: normalize
      # dPhi: normalize
      dR: normalize
      eta: normalize
      mass: log_normalize
      phi: normalize
      pt: log_normalize
    add_jet1pt:
      btagPNetB_5wp: normalize
      # eta: normalize
      # mass: normalize
      # phi: normalize
      # pt: normalize


# ----------------------------------------------------------------------
# REQUIRED - EVENT - Complete list of resonance particles and daughters.
# ----------------------------------------------------------------------
EVENT:
  h1:
    - b1: JetHiggsLeading
    - b2: JetHiggsLeading
  h2:
    - b1: JetHiggsSubLeading
    - b2: JetHiggsSubLeading
  add:
    - a1: Jet5th


# ---------------------------------------------------------
# REQUIRED KEY - PERMUTATIONS - List of valid permutations.
# ---------------------------------------------------------
PERMUTATIONS:
    EVENT:
      - [ h1, h2 ]
    h1:
      - [ b1, b2 ]
    h2:
      - [ b1, b2 ]


# ------------------------------------------------------------------------------
# REQUIRED - REGRESSIONS - List of desired features to regress from observables.
# ------------------------------------------------------------------------------
REGRESSIONS:


# -----------------------------------------------------------------------------
# REQUIRED - REGRESSIONS - List of desired classes to predict from observables.
# -----------------------------------------------------------------------------
CLASSIFICATIONS:
  EVENT:
    - class
